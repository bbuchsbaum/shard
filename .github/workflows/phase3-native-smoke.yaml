on:
  push:
    branches: [efficiency-phase1, main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: Phase 3 native smoke

permissions: read-all

jobs:
  phase3-native-smoke:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} R-${{ matrix.r }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        r: ['release']

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgload, any::testthat, local::.
          needs: check

      - name: Run Phase 3 native regression files
        shell: Rscript {0}
        run: |
          pkgload::load_all(".", quiet = TRUE)
          files <- c(
            "tests/testthat/test-phase3-taskq.R",
            "tests/testthat/test-phase3-altrep-perf.R"
          )
          for (file in files) {
            testthat::test_file(file)
          }
