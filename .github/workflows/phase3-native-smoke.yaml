on:
  push:
    branches: [efficiency-phase1, main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: Phase 3 native smoke

permissions: read-all

jobs:
  phase3-native-smoke:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} R-${{ matrix.r }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        r: ['release']

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_LIMIT_CORES_: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgload, any::testthat, local::.
          needs: check

      - name: Run Phase 3 native regression files
        shell: Rscript {0}
        run: |
          pkgload::load_all(".", quiet = TRUE)
          files <- c(
            "tests/testthat/test-phase3-taskq.R",
            "tests/testthat/test-phase3-altrep-perf.R"
          )
          # testthat::test_file() does NOT set a non-zero exit status on
          # failure, so a bare loop would leave this job green on a real
          # Phase 3 correctness regression. Collect results and fail the
          # job if any test failed or errored.
          bad <- 0L
          for (file in files) {
            res <- as.data.frame(testthat::test_file(file, reporter = "summary"))
            failed <- sum(res$failed) + sum(res$error)
            if (failed > 0L) {
              bad <- bad + failed
              cat(sprintf("FAIL: %s -> %d failed/errored\n", file, failed))
            }
          }
          if (bad > 0L) {
            stop(sprintf("Phase 3 native smoke: %d test failure(s)", bad))
          }
          cat("Phase 3 native smoke: all regression files passed\n")
